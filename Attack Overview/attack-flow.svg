<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>MOVEit Attack Flow — TA505 / Cl0p Kill Chain</title>
  <desc>Seven-stage Cyber Kill Chain diagram showing how TA505 exploited MOVEit Transfer CVE-2023-34362 from reconnaissance through data exfiltration.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background label column -->

  <!-- Stage 1: Reconnaissance -->
  <rect x="40" y="30" width="600" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <rect x="40" y="30" width="8" height="80" rx="4" fill="#185FA5"/>
  <text x="62" y="58" font-family="sans-serif" font-size="11" font-weight="500" fill="#0C447C">1 — RECONNAISSANCE</text>
  <text x="62" y="76" font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53">Shodan &amp; port scanning for vulnerable MOVEit hosts</text>
  <text x="62" y="95" font-family="sans-serif" font-size="11" fill="#185FA5">MITRE T1590 — Gathering Victim Network Information</text>

  <!-- Arrow -->
  <line x1="340" y1="112" x2="340" y2="138" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 2: Weaponization -->
  <rect x="40" y="140" width="600" height="80" rx="10" fill="#FAC77520" stroke="#BA7517" stroke-width="0.5"/>
  <rect x="40" y="140" width="8" height="80" rx="4" fill="#BA7517"/>
  <text x="62" y="168" font-family="sans-serif" font-size="11" font-weight="500" fill="#633806">2 — WEAPONIZATION</text>
  <text x="62" y="186" font-family="sans-serif" font-size="13" font-weight="500" fill="#412402">LEMURLOOT webshell crafted — filename mimics human.aspx</text>
  <text x="62" y="205" font-family="sans-serif" font-size="11" fill="#854F0B">MITRE T1190 (Initial Access) · T1036 (Masquerading)</text>

  <!-- Arrow -->
  <line x1="340" y1="222" x2="340" y2="248" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 3: Delivery -->
  <rect x="40" y="250" width="600" height="80" rx="10" fill="#FAC77520" stroke="#BA7517" stroke-width="0.5"/>
  <rect x="40" y="250" width="8" height="80" rx="4" fill="#BA7517"/>
  <text x="62" y="278" font-family="sans-serif" font-size="11" font-weight="500" fill="#633806">3 — DELIVERY</text>
  <text x="62" y="296" font-family="sans-serif" font-size="13" font-weight="500" fill="#412402">POST requests to guestaccess.aspx; webshell uploaded via moveitsvc</text>
  <text x="62" y="315" font-family="sans-serif" font-size="11" fill="#854F0B">MITRE T1105 — Ingress Tool Transfer</text>

  <!-- Arrow -->
  <line x1="340" y1="332" x2="340" y2="358" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 4: Exploitation -->
  <rect x="40" y="360" width="600" height="80" rx="10" fill="#F7C1C120" stroke="#A32D2D" stroke-width="0.5"/>
  <rect x="40" y="360" width="8" height="80" rx="4" fill="#A32D2D"/>
  <text x="62" y="388" font-family="sans-serif" font-size="11" font-weight="500" fill="#791F1F">4 — EXPLOITATION</text>
  <text x="62" y="406" font-family="sans-serif" font-size="13" font-weight="500" fill="#501313">CVE-2023-34362 SQL injection → svchost → w3wp → human2.aspx</text>
  <text x="62" y="425" font-family="sans-serif" font-size="11" fill="#A32D2D">MITRE T1202 · T1005 · T1082</text>

  <!-- Arrow -->
  <line x1="340" y1="442" x2="340" y2="468" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 5: Installation -->
  <rect x="40" y="470" width="600" height="80" rx="10" fill="#F7C1C120" stroke="#A32D2D" stroke-width="0.5"/>
  <rect x="40" y="470" width="8" height="80" rx="4" fill="#A32D2D"/>
  <text x="62" y="498" font-family="sans-serif" font-size="11" font-weight="500" fill="#791F1F">5 — INSTALLATION</text>
  <text x="62" y="516" font-family="sans-serif" font-size="13" font-weight="500" fill="#501313">LEMURLOOT persists in pseudo-random Temp dir — evades AV detection</text>
  <text x="62" y="535" font-family="sans-serif" font-size="11" fill="#A32D2D">MITRE T1053 · T1005 · T1082 · T1027</text>

  <!-- Arrow -->
  <line x1="340" y1="552" x2="340" y2="578" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 6: C2 -->
  <rect x="40" y="580" width="600" height="90" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="40" y="580" width="8" height="90" rx="4" fill="#534AB7"/>
  <text x="62" y="606" font-family="sans-serif" font-size="11" font-weight="500" fill="#3C3489">6 — COMMAND &amp; CONTROL</text>
  <text x="62" y="624" font-family="sans-serif" font-size="13" font-weight="500" fill="#26215C">HTTP headers (X-siLock-*) authenticate &amp; direct webshell behavior</text>
  <text x="62" y="642" font-family="sans-serif" font-size="11" fill="#534AB7">Step1=-1 → exfil Azure data · Step1=-2 → delete user · else → create admin</text>
  <text x="62" y="658" font-family="sans-serif" font-size="11" fill="#534AB7">MITRE T1104 — Multi-Stage Channels</text>

  <!-- Arrow -->
  <line x1="340" y1="672" x2="340" y2="698" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Stage 7: Actions on Objective -->
  <rect x="40" y="700" width="600" height="90" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <rect x="40" y="700" width="8" height="90" rx="4" fill="#0F6E56"/>
  <text x="62" y="726" font-family="sans-serif" font-size="11" font-weight="500" fill="#085041">7 — ACTIONS ON OBJECTIVE</text>
  <text x="62" y="744" font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C">Data exfiltration: files, Azure config, SQL DB enumeration</text>
  <text x="62" y="762" font-family="sans-serif" font-size="11" fill="#0F6E56">No ransomware deployed — pure extortion via data theft threat</text>
  <text x="62" y="778" font-family="sans-serif" font-size="11" fill="#0F6E56">MITRE T1041 · T1005 — Exfiltration Over C2 Channel</text>

  <!-- Footer -->
  <text x="340" y="830" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888780">TA505 / Cl0p · CVE-2023-34362 · MOVEit Transfer · May–June 2023</text>
</svg>
